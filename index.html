
<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8" />
    <title>3秒自动跳转</title>
    <meta http-equiv="refresh" content="3;url=https://faculty.jnu.edu.cn/xxkxjsxy/lsy2/" />
    <style>
        div {
            width: 300px;
            height: 300px;
            margin: auto;
        }
    </style>
</head>
 
<body>
    <div>
        <h1><span id="time">3</span> 秒后跳转</h1>
    </div>
 
    <script>
        let time = document.getElementById('time');
        let i = 3;
        setInterval(() => {
            i--;
            time.innerHTML = i;
        }, 1000);
    </script>
</body>
 
</html>
